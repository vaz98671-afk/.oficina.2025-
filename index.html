<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Gerenciamento</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --light: #f4f7f6;
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid var(--secondary);
        }

        h1, h2 { text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #bbb; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-add { background-color: var(--secondary); color: white; }
        .btn-add:hover { background-color: #c0392b; transform: scale(1.01); }

        .cliente-card {
            background: #262626;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--secondary);
            position: relative;
        }

        .cliente-header { color: #e74c3c; font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .info { margin: 5px 0; font-size: 0.95em; }
        .info b { color: #888; }

        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-edit { background: #2980b9; color: white; flex: 1; padding: 10px; }
        .btn-delete { background: #c0392b; color: white; flex: 1; padding: 10px; }
        .btn-history { background: var(--success); color: white; width: 100%; margin-top: 10px; }

        footer { text-align: center; margin-top: 40px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏎️ Oficina Auto 2025</h1>
    <hr style="border: 0.5px solid #333; margin-bottom: 30px;">

    <div id="form-container">
        <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" id="nome" placeholder="Ex: João Miguel">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Matrícula</label>
                <input type="text" id="matricula" placeholder="00-AA-00">
            </div>
            <div class="form-group">
                <label>Quilometragem (km)</label>
                <input type="number" id="km" placeholder="120000">
            </div>
        </div>
        <div class="form-group">
            <label>Data do Serviço</label>
            <input type="date" id="data">
        </div>
        <div class="form-group">
            <label>Descrição do Serviço</label>
            <textarea id="descricao" rows="3" placeholder="O que foi feito no carro?"></textarea>
        </div>
        
        <button id="main-button" class="btn-add" onclick="adicionarCliente()">ADICIONAR CLIENTE</button>
    </div>

    <hr style="border: 0.5px solid #333; margin: 40px 0;">

    <h2>📋 Lista de Clientes</h2>
    <div id="lista-clientes">
        </div>
</div>

<footer>
    🏎️ Sistema de Gerenciamento de Oficina Automóvel 🏎️
</footer>

<script>
    let clientes = JSON.parse(localStorage.getItem('oficina_db')) || [];
    let editandoId = null;

    function renderizarClientes() {
        const lista = document.getElementById('lista-clientes');
        lista.innerHTML = '';

        clientes.forEach(cliente => {
            const card = document.createElement('div');
            card.className = 'cliente-card';
            card.innerHTML = `
                <div class="cliente-header">${cliente.nome}</div>
                <div class="info"><b>Matrícula:</b> ${cliente.matricula}</div>
                <div class="info"><b>Quilometragem:</b> ${cliente.km} km</div>
                <div class="info"><b>Data:</b> ${cliente.data}</div>
                <div class="info"><b>Descrição:</b> ${cliente.descricao}</div>
                
                <div class="actions">
                    <button class="btn-edit" onclick="prepararEdicao(${cliente.id})">✎ Editar</button>
                    <button class="btn-delete" onclick="deletarCliente(${cliente.id})">🗑️ Deletar</button>
                </div>
                <button class="btn-history" onclick="alert('Histórico de ${cliente.nome}: ${cliente.descricao}')">📂 Ver Histórico</button>
            `;
            lista.appendChild(card);
        });
    }

    function adicionarCliente() {
        const nome = document.getElementById('nome').value;
        const matricula = document.getElementById('matricula').value;
        const km = document.getElementById('km').value;
        const data = document.getElementById('data').value;
        const descricao = document.getElementById('descricao').value;

        if (!nome || !matricula) {
            alert("Por favor, preencha o Nome e a Matrícula!");
            return;
        }

        if (editandoId !== null) {
            // Lógica de SALVAR EDIÇÃO
            const index = clientes.findIndex(c => c.id === editandoId);
            clientes[index] = { id: editandoId, nome, matricula, km, data, descricao };
            editandoId = null;
            document.getElementById('main-button').innerHTML = "ADICIONAR CLIENTE";
            document.getElementById('main-button').style.backgroundColor = "";
        } else {
            // Lógica de NOVO CLIENTE
            const novoCliente = {
                id: Date.now(),
                nome,
                matricula,
                km,
                data,
                descricao
            };
            clientes.push(novoCliente);
        }

        salvarERenderizar();
        limparFormulario();
    }

    function prepararEdicao(id) {
        const cliente = clientes.find(c => c.id === id);
        if (!cliente) return;

        // Preencher formulário
        document.getElementById('nome').value = cliente.nome;
        document.getElementById('matricula').value = cliente.matricula;
        document.getElementById('km').value = cliente.km;
        document.getElementById('data').value = cliente.data;
        document.getElementById('descricao').value = cliente.descricao;

        // Mudar estado do botão
        editandoId = id;
        const btn = document.getElementById('main-button');
        btn.innerHTML = "💾 GUARDAR ALTERAÇÕES";
        btn.style.backgroundColor = "#f39c12";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deletarCliente(id) {
        if (confirm("Tem certeza que deseja apagar este registo?")) {
            clientes = clientes.filter(c => c.id !== id);
            salvarERenderizar();
        }
    }

    function salvarERenderizar() {
        localStorage.setItem('oficina_db', JSON.stringify(clientes));
        renderizarClientes();
    }

    function limparFormulario() {
        document.getElementById('nome').value = '';
        document.getElementById('matricula').value = '';
        document.getElementById('km').value = '';
        document.getElementById('data').value = '';
        document.getElementById('descricao').value = '';
    }

    // Iniciar site
    renderizarClientes();
</script>

</body>
</html>
